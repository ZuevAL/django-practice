<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CRUD</title>
</head>
<body>
    <form method="POST" action="create/">
        {% csrf_token %}
        <table>
            <tbody>
                {{ form.as_table }}
                <tr>
                    <th colspan="2" align="center"><input type="submit" value="Сохранить"></th>
                </tr>
            </tbody>
        </table>
    </form>
{% if people.count > 0 %}
    <h2>Список пользователей</h2>
    <table>
        <thead align="center">
            <tr>
                <th width="10%">Id</th>
                <td width="30%">Имя</td>
                <td width="10%">Возраст</td>
                <td width="50%">Действие</td>
            </tr>
        </thead>
        <tbody align="center">
        {% for person in people %}
            <tr>
                <td>{{ person.id }}</td>
                <td>{{ person.name }}</td>
                <td>{{ person.age }}</td>
                <td><a href="edit/{{ person.id }}/">Изменить</a> | <a href="delete/{{ person.id }}/">Удалить</a></td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
{% endif %}
</body>
</html>
